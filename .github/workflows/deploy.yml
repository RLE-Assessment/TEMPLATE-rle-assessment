# Quarto GitHub Pages Deploy
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: Quarto GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
  workflow_dispatch:
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: /${{ github.event.repository.name }}
  # GCP authentication (optional - step will be skipped if not configured)
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    if: ${{ vars.SETUP_COMPLETE == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: latest
      - name: Install TinyTeX
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run tinytex-install
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      # Build/publish the ecosystem COG and record ecosystem_raster.cog_url so the
      # assessment pages can show the ecosystem map. Idempotent and skip-if-exists,
      # so it only does heavy work when ecosystem_source.data changes. Skipped when
      # GCP is not configured (pages then show the "COG not built yet" note). Must
      # run before Render, which reads the recorded cog_url.
      - name: Build and publish ecosystem COG
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: pixi run rasterize
      - name: Render Quarto Project
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: pixi run render
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './_book'
          include-hidden-files: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
